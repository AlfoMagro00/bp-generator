<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anagrafica</title>
<link rel="stylesheet" href="_base.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;background:#f2f1ee;color:#1c1c1a;padding:24px 28px 48px;line-height:1.5}
h2{font-size:20px;font-weight:800;margin-bottom:4px}
h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:12px}
.sub{font-size:12.5px;color:#888;margin-bottom:20px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:20px 22px;margin-bottom:14px}
label.fl{display:block;font-size:11.5px;color:#888;font-weight:500;margin-bottom:4px}
input[type=text],input[type=number],input[type=email],input[type=date],input[type=password],select,textarea{width:100%;padding:9px 12px;border:1.5px solid #d0cfc8;border-radius:8px;background:#f8f8f5;color:#1c1c1a;font-size:13.5px;font-family:inherit;outline:none;transition:.12s}
input:focus,select:focus,textarea:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px #dbeafe}
textarea{resize:vertical;min-height:72px}
.f{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid #d0cfc8;background:#fff;color:#1c1c1a;font-family:inherit;transition:.12s}
.btn:hover{background:#f2f1ee}.btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn.pri:hover{background:#1e40af}
.btn.sm{padding:5px 12px;font-size:12px}.btn.ok{background:#dcfce7;color:#166534;border-color:#86efac}
.btn.danger{color:#dc2626;border-color:#fca5a5;background:#fff}.btn.danger:hover{background:#fef2f2}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.tbl th{background:#f2f1ee;color:#888;font-weight:700;padding:8px 10px;border:1px solid #e0dfd8;text-align:right;font-size:11.5px;white-space:nowrap}
table.tbl th:first-child{text-align:left}
table.tbl td{padding:6px 10px;border:1px solid #e0dfd8;text-align:right}
table.tbl td:first-child{text-align:left}
table.tbl tr.sep td{background:#eff6ff!important;font-weight:700;color:#1d4ed8}
table.tbl tr.sub td{background:#f8f8f5!important;font-weight:600}
table.tbl tr.hdr td{background:#1e3a8a!important;color:#fff!important;font-weight:700;text-align:left;font-size:12px}
.neg{color:#dc2626!important}.pos{color:#166534!important}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
.alert.err{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.import-zone{border:2px dashed #c8c7c0;border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:.15s;background:#fafaf8}
.import-zone:hover,.import-zone.drag{border-color:#2563eb;background:#eff6ff}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:2.5px solid transparent;font-family:inherit;transition:.12s}
.tab-btn.on{color:#1d4ed8;border-bottom-color:#1d4ed8;font-weight:700}
.tabs{display:flex;border-bottom:1.5px solid #e0dfd8;margin-bottom:20px}
.year-tab{padding:8px 18px;border:1.5px solid #d0cfc8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#888;font-family:inherit;transition:.12s}
.year-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.year-tab:hover:not(.on){background:#f2f1ee;color:#1c1c1a}
table.tbl input[type=number]{border:none;background:transparent;text-align:right;width:94px;padding:2px 4px;font-size:12.5px;color:#1c1c1a;font-family:inherit}
table.tbl input[type=number]:focus{background:#eff6ff;border-radius:4px;outline:none}
@media(prefers-color-scheme:dark){
  body{background:#111110;color:#eeeee8}
  .card{background:#1a1a18;border-color:#2a2a27}
  input,select,textarea{background:#222220;color:#eeeee8;border-color:#3a3a35}
  input:focus,select:focus,textarea:focus{background:#1a1a18;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
  .btn{background:#1a1a18;color:#eeeee8;border-color:#3a3a35}.btn:hover{background:#222220}
  .btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn.pri:hover{background:#1e40af}
  .btn.ok{background:#0d2018;color:#86efac;border-color:#166534}
  table.tbl th{background:#1e1e1c;color:#666;border-color:#2a2a27}
  table.tbl td{border-color:#2a2a27}
  table.tbl tr.sep td{background:#1e2a40!important;color:#93c5fd}
  table.tbl tr.sub td{background:#1a1a18!important}
  table.tbl tr.hdr td{background:#0c1a3a!important}
  table.tbl input[type=number]{color:#eeeee8}
  h3{color:#555}
  .year-tab{background:#1a1a18;color:#888;border-color:#3a3a35}
  .year-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
  .import-zone{background:#1a1a18;border-color:#3a3a35}
  .import-zone:hover,.import-zone.drag{background:#1e2a40;border-color:#3b82f6}
  .tab-btn.on{color:#93c5fd;border-bottom-color:#93c5fd}
}
</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>

<h2>🏢 Anagrafica cliente</h2>
<p class="sub">Dati identificativi dell'azienda — fogli Cli1–Cli6.</p>

<div class="card">
  <h3>Dati identificativi</h3>
  <div class="g2">
    <div class="f"><label class="fl">Ragione sociale *</label><input type="text" id="c-rs" placeholder="Es. Mag.Al. S.r.l." onchange="send()"></div>
    <div class="f"><label class="fl">Forma giuridica</label>
      <select id="c-fg" onchange="send()"><option value="">—</option>
        <option>S.r.l.</option><option>S.r.l.s.</option><option>S.p.A.</option><option>S.a.s.</option>
        <option>S.n.c.</option><option>Ditta individuale</option><option>Start-up innovativa</option>
        <option>Società cooperativa</option><option>Associazione</option><option>Fondazione</option><option>Altro</option>
      </select>
    </div>
  </div>
  <div class="g3">
    <div class="f"><label class="fl">Partita IVA</label><input type="text" id="c-piva" onchange="send()"></div>
    <div class="f"><label class="fl">Codice Fiscale</label><input type="text" id="c-cf" onchange="send()"></div>
    <div class="f"><label class="fl">Codice REA</label><input type="text" id="c-rea" onchange="send()"></div>
  </div>
  <div class="g3">
    <div class="f"><label class="fl">Data costituzione</label><input type="date" id="c-data" onchange="send()"></div>
    <div class="f"><label class="fl">Stato</label>
      <select id="c-stato" onchange="send()"><option value="">—</option>
        <option>Attiva</option><option>In liquidazione</option><option>Cessata</option><option>Inattiva</option>
      </select>
    </div>
    <div class="f"><label class="fl">Classificazione dimensionale</label>
      <select id="c-dim" onchange="send()"><option value="">—</option>
        <option>Micro impresa</option><option>Piccola impresa</option><option>Media impresa</option><option>Grande impresa</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <h3>Profilo aziendale</h3>
  <div class="g2">
    <div class="f"><label class="fl">Settore di mercato</label>
      <select id="c-sett" onchange="fillSub();send()"><option value="">—</option>
        <option>Tecnologia e Software</option><option>Alimentare e Ristorazione</option><option>E-commerce e Retail</option>
        <option>Moda e Abbigliamento</option><option>Salute e Benessere</option><option>Servizi Professionali</option>
        <option>Immobiliare e Costruzioni</option><option>Turismo e Ospitalità</option><option>Formazione e Istruzione</option>
        <option>Artigianato e Manifattura</option><option>Finanza e Assicurazioni</option><option>Agricoltura e Agroalimentare</option>
        <option>Automotive e Trasporti</option><option>Energia e Utilities</option><option>Media e Comunicazione</option>
        <option>Logistica e Supply Chain</option><option>Sport e Fitness</option>
      </select>
    </div>
    <div class="f"><label class="fl">Sotto-settore</label>
      <select id="c-subsett" onchange="send()"><option value="">—</option></select>
    </div>
  </div>
  <div class="g3">
    <div class="f"><label class="fl">Area geografica</label>
      <select id="c-geo" onchange="send()"><option value="">—</option>
        <option>Locale (città)</option><option>Provinciale</option><option>Regionale</option>
        <option>Nazionale - Italia</option><option>Europa</option><option>Nord America</option>
        <option>Asia Pacifico</option><option>Globale</option>
      </select>
    </div>
    <div class="f"><label class="fl">Modello di business</label>
      <select id="c-biz" onchange="send()"><option value="">—</option>
        <option>B2C</option><option>B2B</option><option>B2G</option><option>Marketplace</option>
        <option>SaaS</option><option>Franchise</option><option>D2C</option><option>Freemium</option>
      </select>
    </div>
    <div class="f"><label class="fl">Fase di sviluppo</label>
      <select id="c-fase" onchange="send()"><option value="">—</option>
        <option>Idea / Pre-lancio</option><option>MVP</option><option>Lancio (0-6 mesi)</option>
        <option>Early stage (6m-2a)</option><option>Crescita (2-5 anni)</option>
        <option>Consolidamento</option><option>Matura (10+ anni)</option><option>Ristrutturazione</option>
      </select>
    </div>
  </div>
  <div class="g3">
    <div class="f"><label class="fl">N° dipendenti</label>
      <select id="c-dip" onchange="send()"><option value="">—</option>
        <option>Solo fondatore (0)</option><option>1-5</option><option>6-15</option>
        <option>16-50</option><option>51-100</option><option>101-250</option><option>Oltre 250</option>
      </select>
    </div>
    <div class="f"><label class="fl">Budget annuale stimato</label>
      <select id="c-budget" onchange="send()"><option value="">—</option>
        <option>&lt; 10.000 €</option><option>10-50.000 €</option><option>50-100.000 €</option>
        <option>100-250.000 €</option><option>250-500.000 €</option><option>500k-1M €</option>
        <option>1-5M €</option><option>5-20M €</option><option>Oltre 20M €</option>
      </select>
    </div>
    <div class="f"><label class="fl">Sito web</label><input type="text" id="c-web" placeholder="https://..." onchange="send()"></div>
  </div>
</div>

<div class="card">
  <h3>Sede legale</h3>
  <div class="g2">
    <div class="f"><label class="fl">Indirizzo</label><input type="text" id="sl-ind" onchange="send()"></div>
    <div class="f"><label class="fl">N. civico</label><input type="text" id="sl-civ" onchange="send()"></div>
  </div>
  <div class="g3">
    <div class="f"><label class="fl">CAP</label><input type="text" id="sl-cap" maxlength="5" onchange="send()"></div>
    <div class="f"><label class="fl">Comune</label><input type="text" id="sl-com" onchange="send()"></div>
    <div class="f"><label class="fl">Provincia (sigla)</label><input type="text" id="sl-prov" maxlength="2" style="text-transform:uppercase" onchange="send()"></div>
  </div>
  <div class="g2">
    <div class="f"><label class="fl">Email</label><input type="email" id="sl-mail" onchange="send()"></div>
    <div class="f"><label class="fl">Telefono</label><input type="text" id="sl-tel" onchange="send()"></div>
  </div>
</div>

<div class="card">
  <h3>Profilo clienti e mercato</h3>
  <div class="g3">
    <div class="f"><label class="fl">Tipo cliente principale</label>
      <select id="cl-tipo" onchange="send()"><option value="">—</option>
        <option>Principalmente PMI</option><option>Grandi aziende</option><option>Consumatori privati</option>
        <option>Enti pubblici</option><option>Startup</option><option>Misto</option>
      </select>
    </div>
    <div class="f"><label class="fl">Canale di vendita principale</label>
      <select id="cl-canale" onchange="send()"><option value="">—</option>
        <option>Solo online (e-commerce proprio)</option><option>Solo online (marketplace)</option>
        <option>Omnicanale</option><option>Solo offline (negozio fisico)</option>
        <option>Vendita diretta B2B</option><option>App mobile</option>
      </select>
    </div>
    <div class="f"><label class="fl">Fascia età clienti</label>
      <select id="cl-eta" onchange="send()"><option value="">—</option>
        <option>18-24</option><option>25-34</option><option>35-44</option>
        <option>45-54</option><option>55-64</option><option>65+</option><option>Mix / Tutte le fasce</option>
      </select>
    </div>
  </div>
  <div class="f"><label class="fl">Concorrenti principali</label>
    <textarea id="cl-conc" rows="2" placeholder="Es. Concorrente A, Concorrente B..." onchange="send()"></textarea>
  </div>
  <div class="f"><label class="fl">Descrizione attività e proposta di valore</label>
    <textarea id="cl-desc" rows="4" placeholder="Descrivi brevemente cosa fa l'azienda e il suo vantaggio competitivo..." onchange="send()"></textarea>
  </div>
</div>

<div class="btn-row">
  <button class="btn pri" onclick="collectAndSend();showSectionStatus('Salvato')">💾 Salva anagrafica</button>
</div>

<script>
const SUBSETT={
  'Tecnologia e Software':["Sviluppo software","SaaS e cloud","AI e ML","Cybersecurity","App mobile","IoT","Big data"],
  'Servizi Professionali':["Consulenza aziendale","Studio legale","Commercialista","Agenzia comunicazione","Recruiting","Formazione"],
  'Alimentare e Ristorazione':["Ristorazione","Bar e caffetteria","Produzione alimentare","Catering","Distribuzione"],
  'Salute e Benessere':["Cliniche","Fisioterapia","Farmacia","Psicologia","Estetica e spa","Palestre"],
  'Immobiliare e Costruzioni':["Agenzia immobiliare","Costruzioni","Ristrutturazioni","Facility management"],
};
function fillSub(){
  const s=document.getElementById("c-sett").value;
  document.getElementById("c-subsett").innerHTML="<option value=\"\">—</option>"+(SUBSETT[s]||[]).map(x=>"<option>"+x+"</option>").join("");
}
function send(){collectAndSend();}
function onInit(){fillSub();fitHeight();}
fitHeight();
</script>
</body></html>
