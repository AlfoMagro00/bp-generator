<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finanziamenti</title>
<link rel="stylesheet" href="_base.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;background:#f2f1ee;color:#1c1c1a;padding:24px 28px 48px;line-height:1.5}
h2{font-size:20px;font-weight:800;margin-bottom:4px}
h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:12px}
.sub{font-size:12.5px;color:#888;margin-bottom:20px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:20px 22px;margin-bottom:14px}
label.fl{display:block;font-size:11.5px;color:#888;font-weight:500;margin-bottom:4px}
input[type=text],input[type=number],input[type=email],input[type=date],input[type=password],select,textarea{width:100%;padding:9px 12px;border:1.5px solid #d0cfc8;border-radius:8px;background:#f8f8f5;color:#1c1c1a;font-size:13.5px;font-family:inherit;outline:none;transition:.12s}
input:focus,select:focus,textarea:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px #dbeafe}
textarea{resize:vertical;min-height:72px}
.f{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid #d0cfc8;background:#fff;color:#1c1c1a;font-family:inherit;transition:.12s}
.btn:hover{background:#f2f1ee}.btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn.pri:hover{background:#1e40af}
.btn.sm{padding:5px 12px;font-size:12px}.btn.ok{background:#dcfce7;color:#166534;border-color:#86efac}
.btn.danger{color:#dc2626;border-color:#fca5a5;background:#fff}.btn.danger:hover{background:#fef2f2}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.tbl th{background:#f2f1ee;color:#888;font-weight:700;padding:8px 10px;border:1px solid #e0dfd8;text-align:right;font-size:11.5px;white-space:nowrap}
table.tbl th:first-child{text-align:left}
table.tbl td{padding:6px 10px;border:1px solid #e0dfd8;text-align:right}
table.tbl td:first-child{text-align:left}
table.tbl tr.sep td{background:#eff6ff!important;font-weight:700;color:#1d4ed8}
table.tbl tr.sub td{background:#f8f8f5!important;font-weight:600}
table.tbl tr.hdr td{background:#1e3a8a!important;color:#fff!important;font-weight:700;text-align:left;font-size:12px}
.neg{color:#dc2626!important}.pos{color:#166534!important}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
.alert.err{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.import-zone{border:2px dashed #c8c7c0;border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:.15s;background:#fafaf8}
.import-zone:hover,.import-zone.drag{border-color:#2563eb;background:#eff6ff}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:2.5px solid transparent;font-family:inherit;transition:.12s}
.tab-btn.on{color:#1d4ed8;border-bottom-color:#1d4ed8;font-weight:700}
.tabs{display:flex;border-bottom:1.5px solid #e0dfd8;margin-bottom:20px}
.year-tab{padding:8px 18px;border:1.5px solid #d0cfc8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#888;font-family:inherit;transition:.12s}
.year-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.year-tab:hover:not(.on){background:#f2f1ee;color:#1c1c1a}
table.tbl input[type=number]{border:none;background:transparent;text-align:right;width:94px;padding:2px 4px;font-size:12.5px;color:#1c1c1a;font-family:inherit}
table.tbl input[type=number]:focus{background:#eff6ff;border-radius:4px;outline:none}
@media(prefers-color-scheme:dark){
  body{background:#111110;color:#eeeee8}
  .card{background:#1a1a18;border-color:#2a2a27}
  input,select,textarea{background:#222220;color:#eeeee8;border-color:#3a3a35}
  input:focus,select:focus,textarea:focus{background:#1a1a18;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
  .btn{background:#1a1a18;color:#eeeee8;border-color:#3a3a35}.btn:hover{background:#222220}
  .btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn.pri:hover{background:#1e40af}
  .btn.ok{background:#0d2018;color:#86efac;border-color:#166534}
  table.tbl th{background:#1e1e1c;color:#666;border-color:#2a2a27}
  table.tbl td{border-color:#2a2a27}
  table.tbl tr.sep td{background:#1e2a40!important;color:#93c5fd}
  table.tbl tr.sub td{background:#1a1a18!important}
  table.tbl tr.hdr td{background:#0c1a3a!important}
  table.tbl input[type=number]{color:#eeeee8}
  h3{color:#555}
  .year-tab{background:#1a1a18;color:#888;border-color:#3a3a35}
  .year-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
  .import-zone{background:#1a1a18;border-color:#3a3a35}
  .import-zone:hover,.import-zone.drag{background:#1e2a40;border-color:#3b82f6}
  .tab-btn.on{color:#93c5fd;border-bottom-color:#93c5fd}
}
</style>

<style>
.loan-card{background:#fff;border:1.5px solid #e0dfd8;border-radius:12px;overflow:hidden;margin-bottom:12px}
.loan-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;transition:.12s}
.loan-head:hover{background:#f8f8f5}
.loan-pill{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;margin-right:10px}
.loan-fr{background:#eff6ff;color:#1d4ed8}.loan-it{background:#dcfce7;color:#166534}
.loan-name{font-size:14px;font-weight:700}
.loan-meta{font-size:12.5px;color:#888;margin-left:8px}
.loan-toggle{font-size:12.5px;color:#888}
.loan-body{padding:18px 20px;border-top:1.5px solid #e0dfd8;display:none}
.loan-open .loan-body{display:block}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.kpi-box{background:#f8f8f5;border:1.5px solid #e0dfd8;border-radius:10px;padding:10px 16px;text-align:center;min-width:105px}
.kpi-val{font-size:16px;font-weight:700;color:#1d4ed8}
.kpi-lbl{font-size:11px;color:#888;margin-top:3px}
.toggle-link{font-size:13px;color:#1d4ed8;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 0;text-decoration:underline}
</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>
<h2>🏦 Finanziamenti</h2>
<p class="sub">4 mutui a rata costante (francese) + 1 a quota capitale costante (italiana). Piano annuale espandibile.</p>
<div id="loans-wrap"></div>
<div class="card">
  <h3>Riepilogo oneri finanziari annuali</h3>
  <div class="tbl-wrap"><table class="tbl" id="riep-tbl"></table></div>
</div>
<script>
function renderLoans(){
  document.getElementById("loans-wrap").innerHTML=D.loans.map((l,i)=>`
    <div class="loan-card" id="lc-${i}">
      <div class="loan-head" onclick="toggleLoan(${i})">
        <div style="display:flex;align-items:center">
          <span class="loan-pill ${l.type==="fr"?"loan-fr":"loan-it"}">${l.type==="fr"?"🏛 Francese":"🇮🇹 Italiana"}</span>
          <span class="loan-name">${esc(l.label||"Mutuo "+(i+1))}</span>
          ${l.active&&l.cap>0?`<span class="loan-meta">— €${fmtN(l.cap)} · ${l.yr} anni · ${l.rate}%</span>`:""}
        </div>
        <span class="loan-toggle" id="ltog-${i}">▼ Espandi</span>
      </div>
      <div class="loan-body" id="lb-${i}">
        <div class="g3" style="margin-bottom:14px">
          <div class="f"><label class="fl">Etichetta</label>
            <input type="text" value="${esc(l.label||"")}" placeholder="es. Banca Intesa"
              onchange="D.loans[${i}].label=this.value;sendToParent({loans:[...D.loans]});renderLoans()">
          </div>
          <div class="f"><label class="fl">Tipo ammortamento</label>
            <select onchange="D.loans[${i}].type=this.value;sendToParent({loans:[...D.loans]});renderLoans()">
              <option value="fr"${l.type==="fr"?" selected":""}>Francese (rata costante)</option>
              <option value="it"${l.type==="it"?" selected":""}>Italiana (quota cap. costante)</option>
            </select>
          </div>
          <div class="f"><label class="fl">Attivo</label>
            <select onchange="D.loans[${i}].active=this.value==='1';sendToParent({loans:[...D.loans]});renderLoans()">
              <option value="0"${!l.active?" selected":""}>No</option>
              <option value="1"${l.active?" selected":""}>Sì</option>
            </select>
          </div>
        </div>
        <div class="g3" style="margin-bottom:16px">
          <div class="f"><label class="fl">Capitale (€)</label>
            <input type="number" value="${l.cap||""}" min="0" step="1000"
              onchange="D.loans[${i}].cap=parseFloat(this.value)||0;sendToParent({loans:[...D.loans]});renderLoanCalc(${i})">
          </div>
          <div class="f"><label class="fl">Durata (anni)</label>
            <input type="number" value="${l.yr||""}" min="1" max="30"
              onchange="D.loans[${i}].yr=parseInt(this.value)||0;sendToParent({loans:[...D.loans]});renderLoanCalc(${i})">
          </div>
          <div class="f"><label class="fl">Tasso annuo (%)</label>
            <input type="number" value="${l.rate||""}" min="0" max="30" step="0.1"
              onchange="D.loans[${i}].rate=parseFloat(this.value)||0;sendToParent({loans:[...D.loans]});renderLoanCalc(${i})">
          </div>
        </div>
        <div id="lcalc-${i}"></div>
      </div>
    </div>`).join("");
  D.loans.forEach((_,i)=>renderLoanCalc(i));
  renderRiepilogo();fitHeight();
}
function toggleLoan(i){const c=document.getElementById("lc-"+i),t=document.getElementById("ltog-"+i),o=c.classList.contains("loan-open");c.classList.toggle("loan-open",!o);t.textContent=o?"▼ Espandi":"▲ Chiudi";fitHeight();}
function calcPiano(l){const n=l.yr*12,r=l.rate/100/12,cap=l.cap;const piano=[];let res=cap;if(l.type==="fr"){const rata=r>0?cap*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):cap/n;for(let m=1;m<=n;m++){const int=res*r,quot=rata-int;res-=quot;piano.push({mese:m,rata,int,quot,residuo:Math.max(0,res)});}}else{const quot=cap/n;for(let m=1;m<=n;m++){const int=res*r,rata=quot+int;res-=quot;piano.push({mese:m,rata,int,quot,residuo:Math.max(0,res)});}}return piano;}
function renderLoanCalc(i){
  const l=D.loans[i];const w=document.getElementById("lcalc-"+i);if(!w)return;
  if(!l.active||!l.cap||!l.yr||!l.rate){w.innerHTML='<p style="font-size:13px;color:#888">Compila capitale, durata e tasso per vedere il piano.</p>';return;}
  const piano=calcPiano(l);
  const totInt=piano.reduce((a,r)=>a+r.int,0),totPag=piano.reduce((a,r)=>a+r.rata,0);
  const costo=(totInt/l.cap/l.yr*100).toFixed(2),rata1=piano[0].rata;
  const anni={};piano.forEach(r=>{const a=Math.ceil(r.mese/12);if(!anni[a])anni[a]={a,rate:0,int:0,quot:0,res:0};anni[a].rate+=r.rata;anni[a].int+=r.int;anni[a].quot+=r.quot;anni[a].res=r.residuo;});
  const rows=Object.values(anni);
  w.innerHTML=`<div class="kpi-row">
    <div class="kpi-box"><div class="kpi-val">€ ${fmtN(rata1)}</div><div class="kpi-lbl">Rata mensile</div></div>
    <div class="kpi-box"><div class="kpi-val">€ ${fmtN(rata1*12)}</div><div class="kpi-lbl">Onere annuo</div></div>
    <div class="kpi-box"><div class="kpi-val">€ ${fmtN(totInt)}</div><div class="kpi-lbl">Tot. interessi</div></div>
    <div class="kpi-box"><div class="kpi-val">€ ${fmtN(totPag)}</div><div class="kpi-lbl">Tot. pagato</div></div>
    <div class="kpi-box"><div class="kpi-val">${costo}%</div><div class="kpi-lbl">Costo effettivo</div></div>
  </div>
  <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:8px">Piano ammortamento annuale</p>
  <div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Anno</th><th>Rata totale</th><th>Quota cap.</th><th>Interessi</th><th>Residuo</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td><strong>Anno ${r.a}</strong></td><td>€ ${fmtN(r.rate)}</td><td>€ ${fmtN(r.quot)}</td><td class="neg">€ ${fmtN(r.int)}</td><td>€ ${fmtN(r.res)}</td></tr>`).join("")}
    <tr class="sep"><td><strong>Totale</strong></td><td>€ ${fmtN(rows.reduce((a,r)=>a+r.rate,0))}</td><td>€ ${fmtN(rows.reduce((a,r)=>a+r.quot,0))}</td><td class="neg">€ ${fmtN(rows.reduce((a,r)=>a+r.int,0))}</td><td>—</td></tr>
    </tbody>
  </table></div>
  <button class="toggle-link" style="margin-top:10px" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.textContent=this.textContent.includes('Mostra')?'▲ Nascondi piano mensile':'▼ Mostra piano mensile'">▼ Mostra piano mensile</button>
  <div style="display:none;margin-top:10px">
    <div class="tbl-wrap"><table class="tbl" style="font-size:11.5px">
      <thead><tr><th>Mese</th><th>Rata</th><th>Quota cap.</th><th>Interessi</th><th>Residuo</th></tr></thead>
      <tbody>${piano.map(r=>`<tr><td>${r.mese}</td><td>€ ${fmtN(r.rata)}</td><td>€ ${fmtN(r.quot)}</td><td class="neg">€ ${fmtN(r.int)}</td><td>€ ${fmtN(r.residuo)}</td></tr>`).join("")}</tbody>
    </table></div>
  </div>`;
  fitHeight();
}
function renderRiepilogo(){
  const allYrs=[...D.hist,...D.prev];
  let h=`<thead><tr><th>Finanziamento</th>${allYrs.map(y=>`<th${D.prev.includes(y)?' style="color:#1d4ed8;font-style:italic"':''}>${y}</th>`).join("")}</tr></thead><tbody>`;
  let tot={};allYrs.forEach(y=>tot[y]=0);
  D.loans.forEach((l,i)=>{
    if(!l.active||!l.cap||!l.yr||!l.rate)return;
    const piano=calcPiano(l);
    h+=`<tr><td>${esc(l.label||"Mutuo "+(i+1))}</td>`;
    allYrs.forEach(y=>{const off=y-D.hist[4];if(off<0||off>=l.yr){h+="<td>—</td>";return;}const ms=off*12+1,me=ms+11;const int=piano.filter(r=>r.mese>=ms&&r.mese<=me).reduce((a,r)=>a+r.int,0);tot[y]+=int;h+=`<td class="neg">${int>0?"€ "+fmtN(int):"—"}</td>`;});
    h+="</tr>";
  });
  h+=`<tr class="sep"><td><strong>Totale interessi</strong></td>${allYrs.map(y=>`<td class="neg"><strong>${tot[y]>0?"€ "+fmtN(tot[y]):"—"}</strong></td>`).join("")}</tr></tbody>`;
  document.getElementById("riep-tbl").innerHTML=h;
}
function onInit(){renderLoans();}
renderLoans();
</script>
</body></html>
