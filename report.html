<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Report Business Plan</title>
<link rel="stylesheet" href="_shared.css">
<style>
body{padding:22px 24px 40px}
/* PRINT STYLES */
@media print {
  body{padding:0}
  .no-print{display:none!important}
  #report-body{padding:0}
  .ps{page-break-inside:avoid}
}
/* REPORT STYLES */
#report-body{max-width:820px;margin:0 auto;background:#fff;color:#111;padding:0}
.ps{margin-bottom:28px;page-break-inside:avoid}
.ps-title{font-size:15px;font-weight:800;padding-bottom:6px;border-bottom:3px solid #1e3a8a;color:#1e3a8a;margin-bottom:14px}
.ps p{font-size:12.5px;line-height:1.7;margin-bottom:6px}
.ps table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.ps table th{background:#1e3a8a;color:#fff;padding:6px 8px;text-align:right}.ps table th:first-child{text-align:left}
.ps table td{padding:5px 8px;border-bottom:1px solid #e5e5e5;text-align:right}.ps table td:first-child{text-align:left}
.ps table tr:nth-child(even) td{background:#f8f8f5}
.ps table tr.sep td{background:#eff6ff!important;font-weight:700;color:#1e3a8a}
.kpi-formula{font-family:monospace;font-size:12px;background:#f0f5ff;padding:5px 10px;border-radius:4px;margin-bottom:8px;color:#1e3a8a}
.kpi-soglie{font-size:11.5px;color:#666;margin-bottom:10px}
.relator-box{background:#f8f8f5;border-left:3px solid #1e3a8a;padding:10px 14px;font-size:12.5px;line-height:1.7;border-radius:0 4px 4px 0;margin-top:10px;white-space:pre-wrap}
</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<!-- CONTROLS -->
<div class="no-print card" style="margin-bottom:20px">
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:12px">
    <h3 style="margin:0">📄 Genera report PDF</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-left:auto">
      <button class="btn pri" onclick="window.print()">🖨️ Stampa / Salva PDF</button>
      <button class="btn" onclick="buildReport()">🔄 Aggiorna</button>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px">
    <div class="f" style="margin:0">
      <label class="fl">Lingua</label>
      <select id="r-lang" onchange="D.lang=this.value;buildReport()" style="font-size:12px;padding:5px 9px">
        <option value="it">🇮🇹 Italiano</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
      </select>
    </div>
    <div>
      <label class="fl">Sezioni da includere</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px" id="mod-sel"></div>
    </div>
  </div>
</div>

<!-- REPORT OUTPUT -->
<div id="report-body"></div>

<script>
const MODS_DEF = [
  {id:'anagrafica',lbl:'Anagrafica'},
  {id:'ce_stor',lbl:'CE storico'},
  {id:'ce_prev',lbl:'CE previsionale'},
  {id:'swot',lbl:'SWOT'},
  {id:'tows',lbl:'TOWS'},
  {id:'tam',lbl:'TAM/SAM/SOM'},
  {id:'kpi',lbl:'KPI'},
  {id:'stress',lbl:'Stress test'},
  {id:'action_plan',lbl:'Action Plan'},
];

function renderModSel() {
  const w = document.getElementById('mod-sel');
  w.innerHTML = MODS_DEF.map(m => `
    <label style="display:flex;align-items:center;gap:5px;padding:4px 9px;background:${D.mods.has(m.id)?'var(--acc-bg)':'var(--sur2)'};border:1px solid ${D.mods.has(m.id)?'var(--acc)':'var(--bors)'};border-radius:var(--r);cursor:pointer;font-size:12px">
      <input type="checkbox" ${D.mods.has(m.id)?'checked':''} onchange="toggleMod('${m.id}',this.checked)" style="margin:0">
      ${m.lbl}
    </label>`).join('');
}

function toggleMod(id, on) {
  if(on) D.mods.add(id); else D.mods.delete(id);
  sendToParent({mods:[...D.mods]});
  renderModSel();
  buildReport();
}

const _rcharts = {};

function buildReport() {
  recalcAll();
  const L = D.lang;
  const allY = [...D.hist, ...D.prev];
  const rs = document.getElementById('c-rs')?.value || '—';
  const fg = document.getElementById('c-fg')?.value || '';
  let sec = 1;
  const S = (title, body) => `<div class="ps"><div class="ps-title">${sec++}. ${esc(title)}</div>${body}</div>`;
  const TBL = (headers, rows) => `<table>
    <thead><tr>${headers.map(h=>`<th>${esc(String(h))}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr${r._cls?' class="'+r._cls+'"':''}>
      ${r.filter((_,i)=>i>0||r._cls===undefined).filter((_,i)=>i!==undefined).map((c,i)=>i===0&&r._cls!==undefined?'':c).join('')}
    </tr>`).join('')}</tbody>
  </table>`;

  // Simplified TBL
  const tbl = (headers, rows) => {
    let h = '<table><thead><tr>'+headers.map(x=>`<th>${esc(String(x||''))}</th>`).join('')+'</tr></thead><tbody>';
    rows.forEach(r => {
      const cls = r[0]==='__s'?' class="sep"':'';
      const cells = r[0]==='__s'?r.slice(1):r;
      h += `<tr${cls}>${cells.map(c=>`<td>${esc(String(c??''))}</td>`).join('')}</tr>`;
    });
    return h + '</tbody></table>';
  };

  let html = `
  <div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border-radius:8px;padding:28px 24px;margin-bottom:28px;text-align:center">
    <div style="font-size:26px;font-weight:800;margin-bottom:6px">${trep('cover_subtitle')}</div>
    <div style="font-size:17px;font-weight:500;margin-bottom:4px">${esc(rs)}${fg?' — '+esc(fg):''}</div>
    <div style="opacity:.75;font-size:12px">${L==='it'?'Anno':L==='en'?'Year':L==='es'?'Año':'Année'} ${D.hist[4]} · ${new Date().toLocaleDateString('it-IT')}</div>
  </div>`;

  // ANAGRAFICA
  if(D.mods.has('anagrafica')){
    const campi=[
      [L==='it'?'Ragione sociale':L==='en'?'Company name':L==='es'?'Razón social':'Raison sociale', document.getElementById('c-rs')?.value],
      [L==='it'?'Forma giuridica':L==='en'?'Legal form':L==='es'?'Forma jurídica':'Forme juridique', document.getElementById('c-fg')?.value],
      ['P.IVA / VAT', document.getElementById('c-piva')?.value],
      [L==='it'?'Settore':'Sector', document.getElementById('c-sett')?.value],
      [L==='it'?'Sede':'Headquarters', [document.getElementById('sl-ind')?.value,document.getElementById('sl-com')?.value,document.getElementById('sl-prov')?.value].filter(Boolean).join(', ')],
    ].filter(r=>r[1]);
    html+=S(trep('sec_anagrafica'),
      `<table>${campi.map(([k,v2])=>`<tr><td style="font-weight:700;width:40%;background:#f8f8f5;padding:5px 8px">${esc(k)}</td><td style="padding:5px 8px">${esc(v2||'')}</td></tr>`).join('')}</table>`);
  }

  // Testi narrativi
  D.lav4.forEach(s => {
    if(s.incl && s.txt && D.mods.has(s.id)) {
      html += S(s.lbl||s.id, `<p class="ps">${esc(s.txt)}</p>`);
    }
  });

  // SWOT
  if(D.mods.has('swot')){
    html+=S('SWOT', `<table>
      <tr><td style="background:#dcfce7;padding:10px;width:50%;vertical-align:top"><strong>💪 ${L==='it'?'Punti di forza':L==='en'?'Strengths':L==='es'?'Fortalezas':'Forces'}</strong><div style="margin-top:6px;white-space:pre-wrap;font-size:11.5px">${esc(D.swot.s||'—')}</div></td>
           <td style="background:#fef3c7;padding:10px;vertical-align:top"><strong>⚠️ ${L==='it'?'Debolezze':L==='en'?'Weaknesses':L==='es'?'Debilidades':'Faiblesses'}</strong><div style="margin-top:6px;white-space:pre-wrap;font-size:11.5px">${esc(D.swot.w||'—')}</div></td></tr>
      <tr><td style="background:#dbeafe;padding:10px;vertical-align:top"><strong>🚀 ${L==='it'?'Opportunità':L==='en'?'Opportunities':L==='es'?'Oportunidades':'Opportunités'}</strong><div style="margin-top:6px;white-space:pre-wrap;font-size:11.5px">${esc(D.swot.o||'—')}</div></td>
           <td style="background:#ffe4e6;padding:10px;vertical-align:top"><strong>⚡ ${L==='it'?'Minacce':L==='en'?'Threats':L==='es'?'Amenazas':'Menaces'}</strong><div style="margin-top:6px;white-space:pre-wrap;font-size:11.5px">${esc(D.swot.t||'—')}</div></td></tr>
    </table>`);
  }

  // TOWS
  if(D.mods.has('tows')){
    html+=S('TOWS', `<table>
      <tr><td style="background:#f0fdf4;padding:8px;width:50%"><strong>SO:</strong> ${esc(D.swot.so||'—')}</td><td style="background:#fffbeb;padding:8px"><strong>ST:</strong> ${esc(D.swot.st||'—')}</td></tr>
      <tr><td style="background:#eff6ff;padding:8px"><strong>WO:</strong> ${esc(D.swot.wo||'—')}</td><td style="background:#fef2f2;padding:8px"><strong>WT:</strong> ${esc(D.swot.wt||'—')}</td></tr>
    </table>`);
  }

  // TAM/SAM/SOM
  if(D.mods.has('tam')){
    const tam=D.tam.n*D.tam.p;
    const sam=D.tam.samAbs||tam*D.tam.samPct/100;
    html+=S('TAM · SAM · SOM', `<table>
      <tr><td style="background:#eff6ff;padding:12px;text-align:center;width:33%"><div style="font-size:11px;color:#1e40af;font-weight:700">🌍 TAM</div><div style="font-size:18px;font-weight:800">€ ${fmtN(tam)}</div></td>
          <td style="background:#f0fdf4;padding:12px;text-align:center"><div style="font-size:11px;color:#166534;font-weight:700">🎯 SAM</div><div style="font-size:18px;font-weight:800">€ ${fmtN(sam)}</div></td>
          <td style="padding:12px;vertical-align:top"><strong>SOM ${L==='it'?'per anno':'per year'}:</strong>
            ${D.tam.somRows?.map(r=>`<div style="font-size:12px">${r.y}: € ${fmtN(r.pct?sam*r.pct/100:r.abs)}</div>`).join('')||'—'}
          </td></tr>
    </table>`);
  }

  // CE STORICO
  if(D.mods.has('ce_stor')){
    html+=S(trep('sec_ce_stor'), tbl(
      [trep('voce'),...D.hist],
      [
        [L==='it'?'Ricavi':'Revenue',...D.hist.map(y=>fmtC(D.ce[`_A1_${y}`]||0))],
        ['__s',L==='it'?'Val. produzione':'Production',...D.hist.map(y=>fmtC(D.ce[`_TA_${y}`]||0))],
        [L==='it'?'Costi produzione':'Prod. costs',...D.hist.map(y=>fmtC(D.ce[`_TB_${y}`]||0))],
        ['__s','EBIT',...D.hist.map(y=>fmtC(D.ce[`_AB_${y}`]||0))],
        ['EBITDA',...D.hist.map(y=>fmtC(D.ce[`_EBITDA_${y}`]||0))],
        ['__s',L==='it'?'Utile netto':'Net income',...D.hist.map(y=>fmtC(D.ce[`_UTILE_${y}`]||0))],
      ]
    ));
  }

  // CE PREVISIONALE
  if(D.mods.has('ce_prev')){
    html+=S(trep('sec_ce_prev'), tbl(
      [trep('voce'),...D.prev],
      [
        [L==='it'?'Ricavi':'Revenue',...D.prev.map(y=>fmtC(D.prevCE[`_A1_${y}`]||0))],
        ['__s','EBIT',...D.prev.map(y=>fmtC(D.prevCE[`_AB_${y}`]||0))],
        ['EBITDA',...D.prev.map(y=>fmtC(D.prevCE[`_EBITDA_${y}`]||0))],
        ['__s',L==='it'?'Utile netto':'Net income',...D.prev.map(y=>fmtC(D.prevCE[`_UTILE_${y}`]||0))],
      ]
    ));
  }

  // KPI — per ogni indice: def + formula + soglie + grafico + tabella + testo
  if(D.mods.has('kpi')){
    const groups = {};
    KPI_DEFS.forEach(k => { if(!groups[k.grp]) groups[k.grp]=[]; groups[k.grp].push(k); });
    Object.entries(groups).forEach(([grp,kpis]) => {
      kpis.forEach(k => {
        const def = tkpi(k.id);
        const histVals = D.hist.map(y => k.fn(y,true,allY));
        const prevVals = D.prev.map(y => k.fn(y,false,allY));
        const allVals = [...histVals,...prevVals];
        const userTxt = D.kpiTexts[`kpi_${k.id}`] || genKpiComment(k.id,allVals,allY);
        html += S(def.title, `
          <p class="ps">${esc(def.def)}</p>
          <div class="kpi-formula">${esc(def.formula)}</div>
          <p class="kpi-soglie">📊 ${esc(def.soglie)}</p>
          <canvas id="rchart-${k.id}" height="120" style="margin-bottom:12px"></canvas>
          ${tbl([trep('anno'),...allY],[
            [trep('valore'),...allVals.map(v=>v!==null?v.toFixed(2)+k.fmt:'—')],
            [trep('variazione'),...allVals.map((v,i)=>{if(i===0||v===null||allVals[i-1]===null)return '—';const ch=(v-allVals[i-1])/Math.abs(allVals[i-1]||1)*100;return (ch>=0?'+':'')+ch.toFixed(1)+'%';})],
          ])}
          <div class="relator-box">${esc(userTxt)}</div>`);
      });
    });
  }

  // STRESS
  if(D.mods.has('stress')){
    html += S(trep('sec_stress'), `<p class="ps" style="color:#555">${L==='it'?'Analisi della resilienza in scenari avversi.':L==='en'?'Resilience analysis under adverse scenarios.':'Analyse de résilience.'}</p><div id="r-stress-tbl"></div>`);
  }

  // ACTION PLAN
  if(D.mods.has('action_plan') && D.apRows.length){
    html += S(trep('sec_ap'), tbl(
      [L==='it'?'Fase':'Phase',L==='it'?'Attività':'Activity',L==='it'?'Responsabile':'Owner',L==='it'?'Trimestri':'Quarters','KPI'],
      D.apRows.map(r=>[r.n,r.att,r.res,r.tri,r.kpi])
    ));
  }

  html += `<div style="margin-top:40px;padding-top:12px;border-top:1px solid #e5e5e5;font-size:10px;color:#aaa;text-align:center">
    BP Generator · ${new Date().toLocaleString('it-IT')} · CONFIDENZIALE
  </div>`;

  document.getElementById('report-body').innerHTML = html;

  // Render KPI charts
  setTimeout(() => {
    KPI_DEFS.forEach(k => {
      const ctx = document.getElementById(`rchart-${k.id}`);
      if(!ctx) return;
      const histVals = D.hist.map(y=>k.fn(y,true,allY));
      const prevVals = D.prev.map(y=>k.fn(y,false,allY));
      if(_rcharts[k.id]) _rcharts[k.id].destroy();
      _rcharts[k.id] = new Chart(ctx, {
        type:'line',
        data:{labels:allY,datasets:[
          {label:trep('storico'),data:[...histVals,...D.prev.map(()=>null)],borderColor:'#1e40af',borderWidth:2,pointRadius:3,tension:.3,fill:false},
          {label:trep('previsionale'),data:[...D.hist.map(()=>null),...prevVals],borderColor:'#16a34a',borderWidth:2,borderDash:[4,3],pointRadius:3,tension:.3,fill:false},
        ]},
        options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:14}}},
          scales:{y:{ticks:{callback:v=>v.toFixed(1)+k.fmt,font:{size:10}}},x:{ticks:{font:{size:10}}}}}
      });
    });
    fitHeight();
  }, 200);
}

function onInit() {
  if(D.lang) document.getElementById('r-lang').value = D.lang;
  renderModSel();
  buildReport();
}

function onLangChange(lang) {
  document.getElementById('r-lang').value = lang;
  buildReport();
}

renderModSel();
buildReport();
</script>
</body>
</html>
