<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home</title>
<link rel="stylesheet" href="_base.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;background:#f2f1ee;color:#1c1c1a;padding:24px 28px 48px;line-height:1.5}
h2{font-size:20px;font-weight:800;margin-bottom:4px}
h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:12px}
.sub{font-size:12.5px;color:#888;margin-bottom:20px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:20px 22px;margin-bottom:14px}
label.fl{display:block;font-size:11.5px;color:#888;font-weight:500;margin-bottom:4px}
input,select{width:100%;padding:7px 10px;border:1.5px solid #d0cfc8;border-radius:7px;background:#f8f8f5;color:#1c1c1a;font-size:13px;font-family:inherit;outline:none}
input:focus,select:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px #dbeafe}
.f{margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #d0cfc8;background:#fff;color:#1c1c1a;font-family:inherit;transition:.12s}
.btn:hover{background:#f2f1ee}
.btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.btn.pri:hover{background:#1e40af}
.prev-chip{padding:8px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;color:#1d4ed8;font-weight:700;text-align:center;font-size:13px}
@media(prefers-color-scheme:dark){
  body{background:#111110;color:#eeeee8}
  .card{background:#1a1a18;border-color:#2a2a27}
  input,select{background:#222220;color:#eeeee8;border-color:#3a3a35}
  input:focus,select:focus{background:#1a1a18;border-color:#3b82f6}
  .btn{background:#1a1a18;color:#eeeee8;border-color:#3a3a35}
  .btn:hover{background:#222220}
  .prev-chip{background:#1e2a40;border-color:#1d4ed8;color:#93c5fd}
  h3{color:#666}
}
</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>

<h2>🏠 Home — Configurazione anni</h2>
<p class="sub">Definisci gli anni storici (fino a 5) e il numero di anni previsionali.</p>

<div class="card">
  <h3>Anni storici</h3>
  <div class="grid4">
    <div class="f"><label class="fl">1° Anno storico</label><input type="number" id="y1" value="2021" onchange="syncYrs()"></div>
    <div class="f"><label class="fl">2° Anno storico</label><input type="number" id="y2" value="2022" onchange="syncYrs()"></div>
    <div class="f"><label class="fl">3° Anno storico</label><input type="number" id="y3" value="2023" onchange="syncYrs()"></div>
    <div class="f"><label class="fl">4° Anno storico</label><input type="number" id="y4" value="2024" onchange="syncYrs()"></div>
  </div>
  <div class="grid2">
    <div class="f"><label class="fl">Anno attuale (5°)</label><input type="number" id="ya" value="2025" onchange="syncYrs()"></div>
    <div class="f"><label class="fl">Anni previsionali</label>
      <select id="nprev" onchange="syncYrs()">
        <option value="3">3 anni</option>
        <option value="5" selected>5 anni</option>
        <option value="10">10 anni</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <h3>Anni previsionali</h3>
  <div id="prev-years" style="display:flex;gap:8px;flex-wrap:wrap"></div>
</div>

<div class="card">
  <h3>Formato</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
    <div class="f"><label class="fl">Valuta</label>
      <select id="currency">
        <option value="€">EUR €</option>
        <option value="$">USD $</option>
        <option value="£">GBP £</option>
      </select>
    </div>
    <div class="f"><label class="fl">Unità valori</label>
      <select id="unit">
        <option value="1">Unità</option>
        <option value="1000" selected>Migliaia (k)</option>
        <option value="1000000">Milioni (M)</option>
      </select>
    </div>
    <div class="f"><label class="fl">Lingua relazione</label>
      <select id="lang-home" onchange="changeLangHome(this.value)">
        <option value="it">🇮🇹 Italiano</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
      </select>
    </div>
  </div>
</div>

<button class="btn pri" onclick="requestSave()">💾 Salva configurazione</button>

<script>
function syncYrs(){
  D.hist = ['y1','y2','y3','y4','ya'].map(id=>+document.getElementById(id).value);
  D.nPrev = +document.getElementById('nprev').value;
  const base = D.hist[4];
  D.prev = Array.from({length:D.nPrev},(_,i)=>base+i+1);
  const w = document.getElementById('prev-years');
  w.innerHTML = D.prev.map(y=>`<div class="prev-chip">${y}</div>`).join('');
  sendToParent({hist:[...D.hist], prev:[...D.prev], nPrev:D.nPrev});
  fitHeight();
}
function changeLangHome(lang){
  D.lang = lang;
  sendToParent({lang});
  if(APP) APP.postMessage({type:'LANG',lang},'*');
}
function onInit(){
  ['y1','y2','y3','y4','ya'].forEach((k,i)=>document.getElementById(k).value=D.hist[i]||'');
  document.getElementById('nprev').value = D.nPrev||5;
  if(D.lang) document.getElementById('lang-home').value = D.lang;
  syncYrs();
}
syncYrs();
</script>
</body></html>
