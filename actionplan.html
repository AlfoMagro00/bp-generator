<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Action Plan</title>
<link rel="stylesheet" href="_base.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;background:#f2f1ee;color:#1c1c1a;padding:24px 28px 48px;line-height:1.5}
h2{font-size:20px;font-weight:800;margin-bottom:4px}
h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:12px}
.sub{font-size:12.5px;color:#888;margin-bottom:20px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:20px 22px;margin-bottom:14px}
label.fl{display:block;font-size:11.5px;color:#888;font-weight:500;margin-bottom:4px}
input[type=text],input[type=number],input[type=email],input[type=date],input[type=password],select,textarea{width:100%;padding:9px 12px;border:1.5px solid #d0cfc8;border-radius:8px;background:#f8f8f5;color:#1c1c1a;font-size:13.5px;font-family:inherit;outline:none;transition:.12s}
input:focus,select:focus,textarea:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px #dbeafe}
textarea{resize:vertical;min-height:72px}
.f{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid #d0cfc8;background:#fff;color:#1c1c1a;font-family:inherit;transition:.12s}
.btn:hover{background:#f2f1ee}.btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn.pri:hover{background:#1e40af}
.btn.sm{padding:5px 12px;font-size:12px}.btn.ok{background:#dcfce7;color:#166534;border-color:#86efac}
.btn.danger{color:#dc2626;border-color:#fca5a5;background:#fff}.btn.danger:hover{background:#fef2f2}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.tbl th{background:#f2f1ee;color:#888;font-weight:700;padding:8px 10px;border:1px solid #e0dfd8;text-align:right;font-size:11.5px;white-space:nowrap}
table.tbl th:first-child{text-align:left}
table.tbl td{padding:6px 10px;border:1px solid #e0dfd8;text-align:right}
table.tbl td:first-child{text-align:left}
table.tbl tr.sep td{background:#eff6ff!important;font-weight:700;color:#1d4ed8}
table.tbl tr.sub td{background:#f8f8f5!important;font-weight:600}
table.tbl tr.hdr td{background:#1e3a8a!important;color:#fff!important;font-weight:700;text-align:left;font-size:12px}
.neg{color:#dc2626!important}.pos{color:#166534!important}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
.alert.err{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.import-zone{border:2px dashed #c8c7c0;border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:.15s;background:#fafaf8}
.import-zone:hover,.import-zone.drag{border-color:#2563eb;background:#eff6ff}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:2.5px solid transparent;font-family:inherit;transition:.12s}
.tab-btn.on{color:#1d4ed8;border-bottom-color:#1d4ed8;font-weight:700}
.tabs{display:flex;border-bottom:1.5px solid #e0dfd8;margin-bottom:20px}
.year-tab{padding:8px 18px;border:1.5px solid #d0cfc8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#888;font-family:inherit;transition:.12s}
.year-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.year-tab:hover:not(.on){background:#f2f1ee;color:#1c1c1a}
table.tbl input[type=number]{border:none;background:transparent;text-align:right;width:94px;padding:2px 4px;font-size:12.5px;color:#1c1c1a;font-family:inherit}
table.tbl input[type=number]:focus{background:#eff6ff;border-radius:4px;outline:none}
@media(prefers-color-scheme:dark){
  body{background:#111110;color:#eeeee8}
  .card{background:#1a1a18;border-color:#2a2a27}
  input,select,textarea{background:#222220;color:#eeeee8;border-color:#3a3a35}
  input:focus,select:focus,textarea:focus{background:#1a1a18;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
  .btn{background:#1a1a18;color:#eeeee8;border-color:#3a3a35}.btn:hover{background:#222220}
  .btn.pri{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn.pri:hover{background:#1e40af}
  .btn.ok{background:#0d2018;color:#86efac;border-color:#166534}
  table.tbl th{background:#1e1e1c;color:#666;border-color:#2a2a27}
  table.tbl td{border-color:#2a2a27}
  table.tbl tr.sep td{background:#1e2a40!important;color:#93c5fd}
  table.tbl tr.sub td{background:#1a1a18!important}
  table.tbl tr.hdr td{background:#0c1a3a!important}
  table.tbl input[type=number]{color:#eeeee8}
  h3{color:#555}
  .year-tab{background:#1a1a18;color:#888;border-color:#3a3a35}
  .year-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
  .import-zone{background:#1a1a18;border-color:#3a3a35}
  .import-zone:hover,.import-zone.drag{background:#1e2a40;border-color:#3b82f6}
  .tab-btn.on{color:#93c5fd;border-bottom-color:#93c5fd}
}
</style>

<style>
.ap-row td{padding:7px 8px;border:1px solid #e0dfd8;vertical-align:middle}
.ap-row td input,.ap-row td select{border:none;background:transparent;font-size:13px;font-family:inherit;width:100%;padding:2px 4px;color:#1c1c1a}
.ap-row td input:focus,.ap-row td select:focus{background:#eff6ff;border-radius:4px;outline:none}
.ap-row:hover td{background:#f8f8f5}
.tri-wrap{display:flex;flex-wrap:wrap;gap:3px}
.tri-btn{border:1.5px solid #d0cfc8;border-radius:6px;padding:3px 6px;font-size:11.5px;cursor:pointer;background:#f8f8f5;font-family:inherit;transition:.1s}
.tri-btn.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.stat-pill{display:inline-block;font-size:11.5px;padding:3px 10px;border-radius:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.s-todo{background:#f2f1ee;color:#888}.s-doing{background:#eff6ff;color:#1d4ed8}
.s-done{background:#dcfce7;color:#166534}.s-late{background:#fef2f2;color:#dc2626}.s-pause{background:#fef3c7;color:#92400e}
.sum-row{display:flex;gap:20px;flex-wrap:wrap}
.sum-item{font-size:13px;color:#888}.sum-item strong{color:#1c1c1a;font-size:13.5px}
</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>
<h2>📅 Action Plan</h2>
<p class="sub">Tabella editabile delle azioni strategiche con responsabili, tempistiche e KPI.</p>
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
    <h3 style="margin:0">Azioni pianificate</h3>
    <div class="btn-row" style="margin:0">
      <button class="btn pri sm" onclick="addRow()">+ Aggiungi azione</button>
      <button class="btn sm" onclick="toggleGantt()">📊 Gantt</button>
      <button class="btn sm danger" onclick="clearAll()">🗑 Svuota</button>
    </div>
  </div>
  <div class="tbl-wrap">
    <table class="tbl">
      <thead><tr>
        <th style="width:28px">#</th><th style="min-width:100px">Fase</th><th style="min-width:180px">Attività</th>
        <th style="min-width:120px">Responsabile</th><th style="min-width:155px">Trimestri</th>
        <th style="width:90px">Risorse €</th><th style="min-width:110px">KPI</th>
        <th style="width:110px">Stato</th><th style="width:32px"></th>
      </tr></thead>
      <tbody id="ap-body"></tbody>
    </table>
  </div>
</div>
<div class="card" id="gantt-card" style="display:none">
  <h3>Vista Gantt</h3>
  <div class="tbl-wrap" id="gantt-wrap"></div>
</div>
<div class="card" style="background:#f8f8f5">
  <div class="sum-row" id="summary"></div>
</div>
<script>
const FASI=["Analisi","Progettazione","Sviluppo","Testing","Lancio","Ottimizzazione","Espansione","Manutenzione"];
const STATI=["Da fare","In corso","Completata","In ritardo","Sospesa"];
const SCLS={"Da fare":"s-todo","In corso":"s-doing","Completata":"s-done","In ritardo":"s-late","Sospesa":"s-pause"};
const TRI=["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8"];
let _gantt=false;
function renderRows(){
  const b=document.getElementById("ap-body");
  if(!D.apRows.length){b.innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:#888">Nessuna azione. Clicca + Aggiungi azione per iniziare.</td></tr>';updateSum();return;}
  b.innerHTML=D.apRows.map((r,i)=>'<tr class="ap-row"><td style="text-align:center;color:#888;font-size:12px">'+( i+1)+'</td><td><select onchange="D.apRows['+i+'].fase=this.value;save()" style="font-size:13px"><option value="">—</option>'+FASI.map(f=>'<option'+(r.fase===f?' selected':'')+'>'+f+'</option>').join('')+'</select></td><td><input type="text" value="'+esc(r.att||'')+'" placeholder="Descrizione..." onchange="D.apRows['+i+'].att=this.value;save()"></td><td><input type="text" value="'+esc(r.res||'')+'" placeholder="Nome / Ruolo" onchange="D.apRows['+i+'].res=this.value;save()"></td><td><div class="tri-wrap">'+TRI.map(t=>'<button class="tri-btn'+(( r.tri||[]).includes(t)?' on':'')+'" onclick="toggleTri('+i+',\"'+t+'\")">'+t+'</button>').join('')+'</div></td><td><input type="number" value="'+( r.ris||'')+'" min="0" step="100" placeholder="€" onchange="D.apRows['+i+'].ris=parseFloat(this.value)||0;save();updateSum()"></td><td><input type="text" value="'+esc(r.kpi||'')+'" placeholder="es. +15% ricavi" onchange="D.apRows['+i+'].kpi=this.value;save()"></td><td><span class="stat-pill '+( SCLS[r.stato]||'s-todo')+'" onclick="cycleStatus('+i+')" title="Clicca per cambiare">'+( r.stato||'Da fare')+'</span></td><td style="text-align:center"><button class="btn sm danger" onclick="delRow('+i+')" style="padding:3px 8px">✕</button></td></tr>').join('');
  updateSum();
}
function toggleTri(i,t){if(!D.apRows[i].tri)D.apRows[i].tri=[];const x=D.apRows[i].tri.indexOf(t);if(x>=0)D.apRows[i].tri.splice(x,1);else D.apRows[i].tri.push(t);save();renderRows();}
function cycleStatus(i){const c=D.apRows[i].stato||'Da fare';D.apRows[i].stato=STATI[(STATI.indexOf(c)+1)%STATI.length];save();renderRows();}
function addRow(){D.apRows.push({id:Date.now(),n:D.apRows.length+1,fase:'',att:'',res:'',tri:[],ris:0,kpi:'',stato:'Da fare'});save();renderRows();fitHeight();}
function delRow(i){if(!confirm('Eliminare questa azione?'))return;D.apRows.splice(i,1);save();renderRows();}
function clearAll(){if(!confirm('Eliminare tutte le azioni?'))return;D.apRows=[];save();renderRows();}
function save(){sendToParent({apRows:[...D.apRows]});}
function updateSum(){
  const tot=D.apRows.reduce((a,r)=>a+(r.ris||0),0);
  document.getElementById('summary').innerHTML=
    '<div class="sum-item">Azioni totali: <strong>'+D.apRows.length+'</strong></div>'+
    '<div class="sum-item">Completate: <strong style="color:#166534">'+D.apRows.filter(r=>r.stato==='Completata').length+'</strong></div>'+
    '<div class="sum-item">In corso: <strong style="color:#1d4ed8">'+D.apRows.filter(r=>r.stato==='In corso').length+'</strong></div>'+
    '<div class="sum-item">Risorse: <strong>€ '+fmtN(tot)+'</strong></div>';
}
function toggleGantt(){_gantt=!_gantt;document.getElementById('gantt-card').style.display=_gantt?'block':'none';if(_gantt)renderGantt();fitHeight();}
function renderGantt(){
  if(!D.apRows.length){document.getElementById('gantt-wrap').innerHTML='<p style="color:#888">Nessuna azione.</p>';return;}
  const ut=new Set();D.apRows.forEach(r=>(r.tri||[]).forEach(t=>ut.add(t)));
  const tris=TRI.filter(t=>ut.has(t));
  let h='<table class="tbl"><thead><tr><th style="min-width:160px">Attività</th><th style="min-width:110px">Responsabile</th>'+tris.map(t=>'<th style="width:52px;text-align:center">'+t+'</th>').join('')+'</tr></thead><tbody>';
  D.apRows.forEach(r=>{h+='<tr><td>'+esc(r.att||r.fase||'—')+'</td><td>'+esc(r.res||'—')+'</td>';tris.forEach(t=>h+='<td style="text-align:center">'+((r.tri||[]).includes(t)?'<div style="background:#1d4ed8;border-radius:4px;height:14px;margin:0 4px"></div>':'')+'</td>');h+='</tr>';});
  document.getElementById('gantt-wrap').innerHTML=h+'</tbody></table>';
}
function onInit(){renderRows();fitHeight();}
renderRows();
</script>
</body></html>
