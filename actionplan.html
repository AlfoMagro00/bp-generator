<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Action Plan</title>
<link rel="stylesheet" href="_shared.css">
<style>
body{padding:22px 24px 40px}
.ap-tbl td input,
.ap-tbl td select{border:none;background:transparent;width:100%;padding:2px 4px;font-size:12px;color:var(--txt);font-family:inherit}
.ap-tbl td input:focus,
.ap-tbl td select:focus{background:var(--acc-bg);border-radius:3px;outline:none}
.ap-tbl td{padding:5px 7px;border:1px solid var(--bor);vertical-align:middle}
.ap-tbl th{background:var(--sur2);padding:7px 8px;border:1px solid var(--bor);font-size:11.5px;font-weight:700;color:var(--mut);white-space:nowrap}
.ap-tbl tr:hover td{background:var(--acc-bg)}
.tri-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;min-width:120px}
.tri-btn{border:1px solid var(--bors);border-radius:3px;padding:2px 4px;font-size:10px;cursor:pointer;text-align:center;background:var(--sur)}
.tri-btn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>

<h2>📅 Action Plan</h2>
<p class="sub">Tabella editabile delle azioni strategiche con responsabili, tempistiche e KPI di controllo.</p>

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <h3 style="margin:0">Azioni pianificate</h3>
    <div class="btn-row" style="margin:0">
      <button class="btn sm pri" onclick="addRow()">+ Aggiungi azione</button>
      <button class="btn sm" onclick="clearAll()" style="color:var(--red)">🗑 Svuota tutto</button>
    </div>
  </div>
  <div class="tbl-wrap">
    <table class="tbl ap-tbl" id="ap-table">
      <thead><tr>
        <th style="width:30px">#</th>
        <th style="min-width:110px">Fase</th>
        <th style="min-width:180px">Attività</th>
        <th style="min-width:130px">Responsabile</th>
        <th style="min-width:140px">Trimestri</th>
        <th style="min-width:100px">Risorse €</th>
        <th style="min-width:120px">KPI di controllo</th>
        <th style="min-width:90px">Stato</th>
        <th style="width:30px"></th>
      </tr></thead>
      <tbody id="ap-body"></tbody>
    </table>
  </div>
</div>

<div class="card" id="gantt-card" style="display:none">
  <h3>Vista Gantt semplificata</h3>
  <div id="gantt-wrap" class="tbl-wrap"></div>
</div>

<div class="card" style="background:var(--sur2)">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:12px;color:var(--mut)">Totale azioni: <strong id="n-rows">0</strong></div>
      <div style="font-size:12px;color:var(--mut)">Risorse totali: <strong id="tot-ris">€ 0</strong></div>
    </div>
    <button class="btn" onclick="toggleGantt()">📊 Vista Gantt</button>
  </div>
</div>

<script>
const FASI_DEF = ['Analisi','Progettazione','Sviluppo','Testing','Lancio','Ottimizzazione','Espansione','Manutenzione'];
const STATI_DEF = ['Da fare','In corso','Completata','In ritardo','Sospesa'];
const TRI_LABELS = ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8'];

function defaultRow(n){
  return {id:Date.now()+n, n:n, fase:'', att:'', res:'', tri:[], ris:0, kpi:'', stato:'Da fare'};
}

function renderRows(){
  const tbody = document.getElementById('ap-body');
  if(!D.apRows.length){
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--mut)">Nessuna azione. Clicca + Aggiungi azione per iniziare.</td></tr>';
    updateTotals(); return;
  }
  tbody.innerHTML = D.apRows.map((r,i)=>`
    <tr>
      <td style="text-align:center;color:var(--mut);font-size:11px">${i+1}</td>
      <td>
        <select style="font-size:11.5px;width:100%;padding:2px 5px;border:none;background:transparent" onchange="D.apRows[${i}].fase=this.value;save()">
          <option value="">—</option>
          ${FASI_DEF.map(f=>`<option${r.fase===f?' selected':''}>${f}</option>`).join('')}
        </select>
      </td>
      <td><input type="text" value="${esc(r.att||'')}" placeholder="Descrizione attività..." onchange="D.apRows[${i}].att=this.value;save()"></td>
      <td><input type="text" value="${esc(r.res||'')}" placeholder="Nome / Ruolo" onchange="D.apRows[${i}].res=this.value;save()"></td>
      <td>
        <div class="tri-grid">
          ${TRI_LABELS.map((tl,ti)=>`
            <button class="tri-btn ${(r.tri||[]).includes(tl)?'on':''}" onclick="toggleTri(${i},'${tl}')">${tl}</button>
          `).join('')}
        </div>
      </td>
      <td><input type="number" value="${r.ris||''}" min="0" step="100" placeholder="€" onchange="D.apRows[${i}].ris=parseFloat(this.value)||0;save();updateTotals()"></td>
      <td><input type="text" value="${esc(r.kpi||'')}" placeholder="es. +15% fatturato" onchange="D.apRows[${i}].kpi=this.value;save()"></td>
      <td>
        <select style="font-size:11px;width:100%;padding:2px 4px;border:none;background:transparent;
          color:${r.stato==='Completata'?'var(--ok)':r.stato==='In ritardo'?'var(--red)':r.stato==='In corso'?'var(--acc-t)':'var(--mut)'}"
          onchange="D.apRows[${i}].stato=this.value;save();renderRows()">
          ${STATI_DEF.map(s=>`<option${r.stato===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td style="text-align:center">
        <button class="btn sm" onclick="deleteRow(${i})" style="color:var(--red);padding:2px 7px">✕</button>
      </td>
    </tr>`).join('');
  updateTotals();
}

function toggleTri(i, tl){
  if(!D.apRows[i].tri) D.apRows[i].tri=[];
  const idx = D.apRows[i].tri.indexOf(tl);
  if(idx>=0) D.apRows[i].tri.splice(idx,1);
  else D.apRows[i].tri.push(tl);
  save();
  renderRows();
}

function addRow(){
  D.apRows.push(defaultRow(D.apRows.length+1));
  save();
  renderRows();
  fitHeight();
}

function deleteRow(i){
  if(!confirm('Eliminare questa azione?')) return;
  D.apRows.splice(i,1);
  save();
  renderRows();
}

function clearAll(){
  if(!confirm('Eliminare tutte le azioni?')) return;
  D.apRows=[];
  save();
  renderRows();
}

function updateTotals(){
  document.getElementById('n-rows').textContent = D.apRows.length;
  const tot = D.apRows.reduce((a,r)=>a+(r.ris||0),0);
  document.getElementById('tot-ris').textContent = '€ '+fmtN(tot);
}

let ganttVisible = false;
function toggleGantt(){
  ganttVisible = !ganttVisible;
  document.getElementById('gantt-card').style.display = ganttVisible?'block':'none';
  if(ganttVisible) renderGantt();
  fitHeight();
}

function renderGantt(){
  const w = document.getElementById('gantt-wrap');
  if(!D.apRows.length){ w.innerHTML='<p style="color:var(--mut);font-size:12px">Nessuna azione.</p>'; return; }
  const allTri = new Set();
  D.apRows.forEach(r=>(r.tri||[]).forEach(t=>allTri.add(t)));
  const tris = TRI_LABELS.filter(t=>allTri.has(t));
  let h=`<table class="tbl" style="font-size:11px"><thead><tr>
    <th style="min-width:160px">Attività</th><th style="min-width:90px">Responsabile</th>
    ${tris.map(t=>`<th style="width:60px;text-align:center">${t}</th>`).join('')}
  </tr></thead><tbody>`;
  D.apRows.forEach(r=>{
    h+=`<tr><td>${esc(r.att||r.fase||'—')}</td><td>${esc(r.res||'—')}</td>`;
    tris.forEach(t=>{
      h+=`<td style="text-align:center">${(r.tri||[]).includes(t)?'<div style="background:var(--acc);border-radius:3px;height:16px;margin:0 4px"></div>':''}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  w.innerHTML=h;
}

function save(){ sendToParent({apRows:[...D.apRows]}); }

function onInit(){ renderRows(); fitHeight(); }
function onLangChange(){ renderRows(); }

renderRows();
</script>
</body>
</html>
