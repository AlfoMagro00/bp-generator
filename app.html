<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BP Generator</title>
<link rel="stylesheet" href="_shared.css">
<style>
body{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}

/* COMPANY PICKER MODAL */
#cp-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
#cp-box{background:var(--sur);border:1px solid var(--bor);border-radius:14px;width:100%;max-width:520px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.cp-head{padding:18px 22px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.cp-head h2{font-size:15px;font-weight:700}
.cp-body{padding:18px 22px}
.az-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:1px solid var(--bor);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:.12s}
.az-item:hover{border-color:var(--acc);background:var(--acc-bg)}
.az-name{font-weight:600;font-size:13.5px}.az-date{font-size:11px;color:var(--mut)}
.az-del{color:var(--red);background:none;border:none;cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px}
.az-del:hover{background:var(--red-bg)}

/* TOP BAR */
#topbar{height:44px;background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:10}
#tb-company{font-weight:700;font-size:13px;color:var(--acc-t)}
#tb-status{font-size:11.5px;color:var(--mut)}
.tb-btn{padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bors);background:none;color:var(--txt)}
.tb-btn:hover{background:var(--sur2)}
.tb-btn.save{background:var(--ok-bg);color:var(--ok);border-color:currentColor}
.tb-btn.danger{color:var(--red);border-color:var(--red)}

/* BODY LAYOUT */
#layout{display:flex;flex:1}

/* NAV */
#nav{width:220px;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;position:sticky;top:44px;height:calc(100vh - 44px);overflow-y:auto;flex-shrink:0}
.nav-lang{padding:10px 12px;border-bottom:1px solid var(--bor)}
.nav-lang select{font-size:11.5px;padding:4px 8px}
.nav-sec{padding:10px 12px 3px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
.ni{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:12.5px;color:var(--mut);margin:1px 5px;border:none;background:none;width:calc(100% - 10px);text-align:left;transition:.12s}
.ni:hover{background:var(--bg);color:var(--txt)}.ni.on{background:var(--acc-bg);color:var(--acc-t);font-weight:600}
.ni .ic{font-size:14px;flex-shrink:0;width:18px}
.nav-bot{margin-top:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.nav-bot button{width:100%;padding:8px;border:none;border-radius:var(--r);font-size:12.5px;font-weight:600;cursor:pointer}
.nav-bot .nb-report{background:var(--acc);color:#fff}
.nav-bot .nb-report:hover{opacity:.87}
.nav-bot .nb-export{background:var(--ok-bg);color:var(--ok);border:1px solid currentColor}

/* CONTENT FRAME */
#content-wrap{flex:1;overflow:auto}
#content-frame{width:100%;min-height:calc(100vh - 44px);border:none;display:block}
</style>
</head>
<body>
<script src="core.js"></script>

<!-- COMPANY PICKER -->
<div id="cp-overlay">
  <div id="cp-box">
    <div class="cp-head">
      <div>
        <h2>Scegli azienda</h2>
        <p style="font-size:12px;color:var(--mut);margin-top:2px">Ciao <strong id="cp-nome"></strong></p>
      </div>
      <button class="btn sm danger tb-btn" onclick="doLogout()">Esci</button>
    </div>
    <div class="cp-body">
      <div id="az-list"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input type="text" id="new-az" placeholder="Nome nuova azienda..." style="flex:1" onkeydown="if(event.key==='Enter')createAz()">
        <button class="btn pri" onclick="createAz()">+ Crea</button>
      </div>
      <div id="cp-err" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span id="tb-company">—</span>
  <span id="tb-status"></span>
  <div style="margin-left:auto;display:flex;gap:7px">
    <button class="tb-btn" onclick="go('import')">📥 Import</button>
    <button class="tb-btn save" id="btn-save" onclick="doSave()">💾 Salva</button>
    <button class="tb-btn" onclick="switchAz()">↔ Azienda</button>
    <button class="tb-btn danger" onclick="doLogout()">Esci</button>
  </div>
</div>

<!-- LAYOUT -->
<div id="layout">
  <nav id="nav">
    <div class="nav-lang">
      <select id="lang-nav" onchange="changeLang(this.value)" style="width:100%">
        <option value="it">🇮🇹 Italiano</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
      </select>
    </div>
    <div class="nav-sec">Configurazione</div>
    <button class="ni on" onclick="go('home')" id="ni-home"><span class="ic">🏠</span>Home & Anni</button>
    <button class="ni" onclick="go('anagrafica')" id="ni-anagrafica"><span class="ic">🏢</span>Anagrafica</button>
    <div class="nav-sec">Bilanci storici</div>
    <button class="ni" onclick="go('bilanci')" id="ni-bilanci"><span class="ic">📊</span>CE & Stato patrimoniale</button>
    <div class="nav-sec">Previsionali</div>
    <button class="ni" onclick="go('previsionali')" id="ni-previsionali"><span class="ic">🔮</span>Dati previsionali</button>
    <button class="ni" onclick="go('finanziamenti')" id="ni-finanziamenti"><span class="ic">🏦</span>Finanziamenti</button>
    <button class="ni" onclick="go('stress')" id="ni-stress"><span class="ic">⚡</span>Stress test</button>
    <button class="ni" onclick="go('kpi')" id="ni-kpi"><span class="ic">📈</span>KPI & Indici</button>
    <div class="nav-sec">Business plan</div>
    <button class="ni" onclick="go('narrativo')" id="ni-narrativo"><span class="ic">📝</span>Testi & SWOT & TAM</button>
    <button class="ni" onclick="go('actionplan')" id="ni-actionplan"><span class="ic">📅</span>Action Plan</button>
    <div class="nav-sec">Strumenti</div>
    <button class="ni" onclick="go('import')" id="ni-import"><span class="ic">📥</span>Import Excel</button>
    <div class="nav-bot">
      <button class="nb-export" onclick="doExportTemplate()">📤 Export template</button>
      <button class="nb-report" onclick="go('report')">📄 Genera report</button>
    </div>
  </nav>
  <div id="content-wrap">
    <iframe id="content-frame" src="home.html" onload="onFrameLoad()"></iframe>
  </div>
</div>

<script>
// ── FRAME COMMUNICATION ──────────────────────────────────────
const PAGES = {
  home:'home.html', anagrafica:'anagrafica.html', bilanci:'bilanci.html',
  previsionali:'previsionali.html', finanziamenti:'finanziamenti.html',
  stress:'stress.html', kpi:'kpi.html', narrativo:'narrativo.html',
  actionplan:'actionplan.html', import:'import.html', report:'report.html',
};

let _currentPage = 'home';

function go(page){
  if(!PAGES[page])return;
  // Salva dati dalla sezione corrente prima di navigare
  const fr = document.getElementById('content-frame');
  try{ fr.contentWindow?.collectAndSend?.(); }catch{}
  _currentPage = page;
  fr.src = PAGES[page];
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const ni = document.getElementById('ni-'+page);
  if(ni) ni.classList.add('on');
}

function onFrameLoad(){
  // Invia stato D alla sezione appena caricata
  const fr = document.getElementById('content-frame');
  try{
    fr.contentWindow.postMessage({type:'INIT',D:serialize(D),session:{
      currentNome:SESSION.currentNome,
      lang:D.lang,
    }},'*');
  }catch{}
  // Aggiusta altezza iframe
  try{
    const h = fr.contentWindow.document.body.scrollHeight;
    if(h>400) fr.style.height = h+'px';
  }catch{}
}

// Ricevi dati aggiornati dalle sezioni
window.addEventListener('message',e=>{
  if(e.data?.type==='UPDATE'){
    merge(e.data.D);
    if(e.data.resize) document.getElementById('content-frame').style.height=e.data.resize+'px';
  }
  if(e.data?.type==='SAVE') doSave();
  if(e.data?.type==='EXPORT_TPL') doExportTemplate();
  if(e.data?.type==='NAV') go(e.data.page);
});

function serialize(d){
  return JSON.parse(JSON.stringify({...d, mods:[...d.mods]}));
}
function merge(upd){
  if(!upd)return;
  if(upd.ce) Object.assign(D.ce,upd.ce);
  if(upd.sp) Object.assign(D.sp,upd.sp);
  if(upd.prevGrowth) Object.assign(D.prevGrowth,upd.prevGrowth);
  if(upd.prevAbs) Object.assign(D.prevAbs,upd.prevAbs);
  if(upd.prevMode) Object.assign(D.prevMode,upd.prevMode);
  if(upd.loans) D.loans.splice(0,D.loans.length,...upd.loans);
  if(upd.lav4) upd.lav4.forEach((s,i)=>{if(D.lav4[i])Object.assign(D.lav4[i],s);});
  if(upd.swot) Object.assign(D.swot,upd.swot);
  if(upd.tam) Object.assign(D.tam,upd.tam);
  if(upd.apRows) D.apRows.splice(0,D.apRows.length,...upd.apRows);
  if(upd.mods){D.mods.clear();upd.mods.forEach(m=>D.mods.add(m));}
  if(upd.kpiTexts) Object.assign(D.kpiTexts,upd.kpiTexts);
  if(upd.stress) Object.assign(D.stress,upd.stress);
  if(upd.hist) D.hist.splice(0,D.hist.length,...upd.hist);
  if(upd.prev) D.prev.splice(0,D.prev.length,...upd.prev);
  if(upd.nPrev) D.nPrev=upd.nPrev;
  if(upd.lang){D.lang=upd.lang;document.getElementById('lang-nav').value=upd.lang;}
  // Sync campi form dall'iframe
  if(upd.fields){
    Object.entries(upd.fields).forEach(([id,val])=>{
      // Questi campi vivono nell'iframe, non qui
    });
  }
}

// ── COMPANY PICKER ───────────────────────────────────────────
function renderAzList(aziende){
  const w=document.getElementById('az-list');
  if(!aziende?.length){w.innerHTML='<p style="color:var(--mut);font-size:12px;text-align:center;padding:10px 0">Nessuna azienda. Creane una nuova.</p>';return;}
  w.innerHTML=aziende.map(a=>`
    <div class="az-item" onclick="openAz('${esc(a.id)}','${esc(a.slug)}','${esc(a.nome)}')">
      <div><div class="az-name">🏢 ${esc(a.nome)}</div>${a.updated_at?`<div class="az-date">${new Date(a.updated_at).toLocaleString('it-IT')}</div>`:''}</div>
      <button class="az-del" onclick="event.stopPropagation();deleteAz('${esc(a.id)}','${esc(a.nome)}')">🗑</button>
    </div>`).join('');
}

async function switchAz(){ renderAzList(await loadAziende()); document.getElementById('cp-overlay').style.display='flex'; }

async function createAz(){
  const nome=document.getElementById('new-az').value.trim(); if(!nome)return;
  const errEl=document.getElementById('cp-err');
  if(!SESSION.user?.id){errEl.innerHTML='<div class="alert err">Sessione scaduta</div>';return;}
  try{
    const slug=nome.toLowerCase().replace(/[^a-z0-9]/g,'_').substring(0,40);
    const row=await SB.insert('aziende',{user_id:SESSION.user.id,nome,slug,data:{}});
    document.getElementById('new-az').value='';
    errEl.innerHTML='';
    openAz(row.id,row.slug,row.nome);
  }catch(e){errEl.innerHTML=`<div class="alert err">${esc(e.message)}</div>`;}
}

async function deleteAz(id,nome){
  if(!confirm(`Eliminare "${nome}"?`))return;
  try{await SB.delete('aziende',`id=eq.${id}`); renderAzList(await loadAziende());}
  catch(e){alert(e.message);}
}

async function openAz(id,slug,nome){
  SESSION.currentDbId=id; SESSION.currentSlug=slug; SESSION.currentNome=nome;
  try{
    const rows=await SB.select('aziende',`id=eq.${id}`);
    const az=rows[0];
    if(az?.data && Object.keys(az.data).length>0){
      loadDataIntoApp(az.data);
      setStatus('Caricato — '+new Date(az.updated_at).toLocaleTimeString('it-IT'));
    } else {
      setStatus('Nuova azienda');
    }
  }catch{ setStatus('Nuova azienda'); }
  document.getElementById('tb-company').textContent='🏢 '+nome;
  document.getElementById('cp-overlay').style.display='none';
  go('home');
}

// ── SAVE ─────────────────────────────────────────────────────
async function doSave(){
  if(!SESSION.currentDbId){alert('Seleziona prima un\'azienda');return;}
  const btn=document.getElementById('btn-save');
  btn.textContent='...'; btn.disabled=true;
  try{
    // Raccogli dati correnti dall'iframe
    const fr=document.getElementById('content-frame');
    try{fr.contentWindow?.collectAndSend?.();}catch{}
    await new Promise(r=>setTimeout(r,200));
    await saveData();
    setStatus('Salvato alle '+new Date().toLocaleTimeString('it-IT'));
    btn.textContent='✅'; setTimeout(()=>{btn.textContent='💾 Salva';btn.disabled=false;},2000);
  }catch(e){
    setStatus('Errore: '+e.message); btn.textContent='❌'; btn.disabled=false;
    setTimeout(()=>btn.textContent='💾 Salva',3000);
  }
}

function setStatus(msg){document.getElementById('tb-status').textContent=msg;}

async function doLogout(){
  try{await SB.signOut();}catch{}
  clearSession();
  window.location.href='index.html';
}

function doExportTemplate(){
  // Carica XLSX se serve
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>exportTemplate();
    document.head.appendChild(s);
  } else {
    exportTemplate();
  }
}

// ── LINGUA ───────────────────────────────────────────────────
function changeLang(lang){
  D.lang=lang;
  // Propaga all'iframe corrente
  const fr=document.getElementById('content-frame');
  try{fr.contentWindow.postMessage({type:'LANG',lang},'*');}catch{}
}

// ── AUTOSAVE ─────────────────────────────────────────────────
setInterval(()=>{if(SESSION.currentDbId) doSave();},120000);

// ── BOOT ─────────────────────────────────────────────────────
(async()=>{
  if(!loadSession()){window.location.href='index.html';return;}
  try{
    const u=await SB.getUser();
    SESSION.user=u;
    document.getElementById('cp-nome').textContent=u.user_metadata?.nome||u.email||'';
    const aziende=await loadAziende();
    if(aziende.length>0){
      renderAzList(aziende);
      document.getElementById('cp-overlay').style.display='flex';
    } else {
      document.getElementById('cp-nome').textContent=u.user_metadata?.nome||u.email||'';
      document.getElementById('cp-overlay').style.display='flex';
    }
  }catch{clearSession();window.location.href='index.html';}
})();

// ── SHARED FRAME HELPERS ─────────────────────────────────────
// Ogni sezione chiama window.parent.postMessage per inviare dati
// e window.parent.D per leggere lo stato globale
</script>
</body>
</html>
