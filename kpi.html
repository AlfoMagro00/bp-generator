<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KPI & Indici</title>
<link rel="stylesheet" href="_shared.css">
<style>body{padding:22px 24px 40px}</style>
</head>
<body>
<script src="core.js"></script>
<script src="_frame.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<h2>📈 KPI & Indici finanziari</h2>
<p class="sub">Grafico storico + previsionale, tabella variazioni anno su anno, testo relatore modificabile.</p>

<div id="kpi-wrap"></div>

<script>
const _charts = {};

function renderAllKpi() {
  recalcAll();
  const allY = [...D.hist, ...D.prev];
  const groups = {};
  KPI_DEFS.forEach(k => { if(!groups[k.grp]) groups[k.grp]=[]; groups[k.grp].push(k); });

  document.getElementById('kpi-wrap').innerHTML = Object.entries(groups).map(([grp,kpis]) => `
    <div class="card">
      <h3>${tgrp(grp)}</h3>
      ${kpis.map(k => {
        const def = tkpi(k.id);
        const histVals = D.hist.map(y => k.fn(y,true,allY));
        const prevVals = D.prev.map(y => k.fn(y,false,allY));
        const allVals = [...histVals,...prevVals];
        const userTxt = D.kpiTexts[`kpi_${k.id}`] || '';
        const autoTxt = genKpiComment(k.id, allVals, allY);
        // chips storici
        const chips = D.hist.map((y,i) => {
          const val = histVals[i];
          if(val===null) return '';
          const isGood = k.fmt==='%' ? (k.id==='debt_ratio'?val<50:val>5) : val>1;
          return `<span style="background:${isGood?'var(--ok-bg)':'var(--red-bg)'};color:${isGood?'var(--ok)':'var(--red)'};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600">${y}: ${val.toFixed(1)}${k.fmt}</span>`;
        }).join('');
        return `
          <div style="border:1px solid var(--bor);border-radius:var(--r);padding:14px;margin-bottom:12px">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
              <strong style="font-size:14px">${def.title}</strong>
              <div style="display:flex;flex-wrap:wrap;gap:5px">${chips}</div>
            </div>
            ${def.formula?`<p style="font-size:12px;font-family:monospace;background:var(--sur2);padding:5px 9px;border-radius:var(--r);margin-bottom:8px;color:var(--acc-t)">${def.formula}</p>`:''}
            ${def.soglie?`<p style="font-size:11.5px;color:var(--mut);margin-bottom:10px">📊 ${def.soglie}</p>`:''}
            <canvas id="chart-${k.id}" height="130" style="margin-bottom:12px"></canvas>
            <div class="tbl-wrap" style="margin-bottom:12px">
              <table class="tbl" id="vtbl-${k.id}"></table>
            </div>
            <div>
              <label style="font-size:11px;color:var(--mut);display:block;margin-bottom:3px">💬 Testo relatore — ${def.title}</label>
              <textarea id="ktxt-${k.id}" rows="3" style="font-size:12.5px;width:100%;padding:6px 8px;border:1px solid var(--bors);border-radius:var(--r);background:var(--sur2)"
                onchange="D.kpiTexts['kpi_${k.id}']=this.value;sendToParent({kpiTexts:{...D.kpiTexts}})">${esc(userTxt||autoTxt)}</textarea>
            </div>
          </div>`;
      }).join('')}
    </div>`).join('');

  // Render tables + charts after DOM update
  setTimeout(() => {
    KPI_DEFS.forEach(k => {
      const allVals = [...D.hist.map(y=>k.fn(y,true,allY)), ...D.prev.map(y=>k.fn(y,false,allY))];
      // Tabella variazioni
      const vtbl = document.getElementById(`vtbl-${k.id}`);
      if(vtbl) {
        let h = `<thead><tr><th>${trep('anno')}</th>${allY.map(y=>`<th${D.prev.includes(y)?' style="color:var(--acc-t);font-style:italic"':''}>${y}</th>`).join('')}</tr></thead><tbody>`;
        h += `<tr><td>${trep('valore')}</td>${allVals.map(v=>v!==null?`<td>${v.toFixed(2)}${k.fmt}</td>`:'<td>—</td>').join('')}</tr>`;
        h += `<tr><td>${trep('variazione')}</td>${allVals.map((v,i)=>{if(i===0||v===null||allVals[i-1]===null)return '<td>—</td>';const ch=(v-allVals[i-1])/Math.abs(allVals[i-1]||1)*100;return `<td class="${ch<0?'neg':'pos'}">${ch>=0?'+':''}${ch.toFixed(1)}%</td>`;}).join('')}</tr>`;
        h += '</tbody>';
        vtbl.innerHTML = h;
      }
      // Grafico
      const ctx = document.getElementById(`chart-${k.id}`);
      if(!ctx) return;
      const histVals = D.hist.map(y=>k.fn(y,true,allY));
      const prevVals = D.prev.map(y=>k.fn(y,false,allY));
      if(_charts[k.id]) _charts[k.id].destroy();
      _charts[k.id] = new Chart(ctx, {
        type:'line',
        data:{
          labels:allY,
          datasets:[
            {label:trep('storico'),data:[...histVals,...D.prev.map(()=>null)],borderColor:'#1e40af',backgroundColor:'rgba(30,64,175,.07)',borderWidth:2,pointRadius:4,tension:.3,fill:true},
            {label:trep('previsionale'),data:[...D.hist.map(()=>null),...prevVals],borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.07)',borderWidth:2,borderDash:[5,4],pointRadius:4,tension:.3,fill:true},
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:16}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw!==null?c.raw.toFixed(2)+k.fmt:'—'}`}}},
          scales:{
            y:{ticks:{callback:v=>v.toFixed(1)+k.fmt,font:{size:11}}},
            x:{ticks:{font:{size:11}}}
          }
        }
      });
    });
    fitHeight();
  }, 150);
}

function onInit() { renderAllKpi(); }
function onLangChange() { renderAllKpi(); }

renderAllKpi();
</script>
</body>
</html>
